name: OCI Preview Image
on:
  workflow_run:
    workflows:
      - 'pr-check'
    types:
      - completed

permissions:
  contents: read
  id-token: write
  attestations: write
  actions: read
  packages: write
  checks: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.id }}
  cancel-in-progress: true

jobs:
  publish:
    name: Publish content of the pull request
    runs-on: ubuntu-24.04
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository }}/pr:${{ github.event.workflow_run.head_sha }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}
          path: .

      - uses: ./.github/actions/oci-publish/action.yml
        with:
          run-id: ${{ github.event.workflow_run.id }}
          registry-username: ${{ github.repository_owner }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}
          image-name: ${{ github.repository }}
          tag: ${{ github.event.workflow_run.head_sha }}

      - name: Publish check run
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          ruby <<'EOF' | gh api repos/${{ github.repository }}/check-runs -X POST --input -
          require "json"

          report = {
            name: "OCI Preview Image",
            head_sha: ENV["HEAD_SHA"],
            status: "completed",
            conclusion: "success",
            output: {
              title: "Preview Image",
              summary: "OCI preview image built successfully.",
              text: "```\n#{ENV["IMAGE_NAME"]}\n```"
            }
          }

          puts JSON.generate(report)
          EOF
