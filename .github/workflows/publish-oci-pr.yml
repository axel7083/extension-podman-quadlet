name: publish-oci-pr
on:
  workflow_run:
    workflows:
      - 'pr-check'
    types:
      - completed

permissions:
  contents: read
  id-token: write
  attestations: write
  actions: read
  packages: write
  checks: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.id }}
  cancel-in-progress: true

jobs:
  publish:
    name: Publish content of the pull request
    runs-on: ubuntu-24.04
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository }}/pr:${{ github.event.workflow_run.head_sha }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: oci-image
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}
          path: .

      - name: Log in to ${{ inputs.registry }}
        uses: redhat-actions/podman-login@4934294ad0449894bcd1e9f191899d7292469603 #v1.7
        with:
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io

      - name: Import image
        shell: bash
        run: podman import oci-image.tar ${{ env.IMAGE_NAME }}

      - name: Push Image
        if: ${{ github.event.workflow_run.pull_requests[0] != null }}
        id: push-to-registry
        uses: redhat-actions/push-to-registry@5ed88d269cf581ea9ef6dd6806d01562096bee9c #v2.8
        with:
          tags: ${{ env.IMAGE_NAME }}

      - name: Generate artifact attestation
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 #v4.1.0
        with:
          subject-name: ghcr.io/${{ github.repository }}/pr
          subject-digest: ${{ steps.push-to-registry.outputs.digest }}
          push-to-registry: true

      - name: Publish check run
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          ruby <<'EOF' | gh api repos/${{ github.repository }}/check-runs -X POST --input -
          require "json"

          report = {
            name: "OCI Preview Image",
            head_sha: ENV["HEAD_SHA"],
            status: "completed",
            conclusion: "success",
            output: {
              title: "Preview Image",
              summary: "OCI preview image built successfully.",
              text: "```\n#{ENV["IMAGE_NAME"]}\n```"
            }
          }

          puts JSON.generate(report)
          EOF
