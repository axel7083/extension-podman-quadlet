name: publish-oci-pr
on:
  workflow_run:
    workflows:
      - 'pr-check'
    types:
      - completed

permissions:
  contents: read
  id-token: write
  attestations: write
  actions: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.pull_requests[0].number }}
  cancel-in-progress: true

jobs:
  publish:
    name: Publish content of the pull request
    runs-on: ubuntu-24.04
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: oci-image
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}
          path: .

      - name: Import image
        shell: bash
        run: podman import oci-image.tar ${{ github.repository }}/pr:${{ github.event.workflow_run.head_sha }}

      - name: Push Image
        if: ${{ github.event.workflow_run.pull_requests[0] != null }}
        id: push-to-registry
        uses: redhat-actions/push-to-registry@5ed88d269cf581ea9ef6dd6806d01562096bee9c #v2.8
        with:
          image: ${{ github.repository }}/pr
          tags: ${{ github.event.workflow_run.head_sha }}
          registry: ghcr.io

      - name: Generate artifact attestation
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 #v4.1.0
        with:
          subject-name: ghcr.io/${{ github.repository }}/pr
          subject-digest: ${{ steps.push-to-registry.outputs.digest }}
          push-to-registry: true
